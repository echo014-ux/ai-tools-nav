<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131f;
            --bg-card: #1a1a2e;
            --bg-hover: #252542;
            --text-primary: #e6e6f0;
            --text-secondary: #8b8b9e;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a45;
            --ad-bg: #1e1e3a;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(19, 19, 31, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 20px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .search-box {
            position: relative;
            width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Top Ad Banner */
        .ad-banner-top {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .ad-banner-inner {
            background: var(--ad-bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .ad-banner-inner span {
            display: block;
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 25px;
        }

        .content-area {
            flex: 1;
            min-width: 0;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .category-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Tool Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #a855f7);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .tool-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .tool-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tool-info .tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tool-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tool-stats {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .tool-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .visit-btn {
            padding: 8px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .visit-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* Ad in Grid */
        .ad-card {
            background: var(--ad-bg);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-secondary);
            min-height: 200px;
        }

        .ad-card .ad-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
        }

        .sidebar-ad {
            background: var(--ad-bg);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .sidebar-ad .ad-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .sidebar-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .sidebar-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hot-tool {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hot-tool:last-child {
            border-bottom: none;
        }

        .hot-tool:hover {
            color: var(--accent);
        }

        .hot-rank {
            width: 28px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .hot-rank.top3 {
            background: var(--accent);
            color: white;
        }

        .hot-info {
            flex: 1;
            min-width: 0;
        }

        .hot-info .name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .hot-info .desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .search-box {
                width: 200px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                height: 60px;
            }

            .logo {
                font-size: 1.2rem;
            }

            .logo-icon {
                width: 32px;
                height: 32px;
            }
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tool-card {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>

        let currentCategory = 'all';
        let searchQuery = '';

        // 渲染工具卡片
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const noResults = document.getElementById('noResults');
            
            let filtered = tools.filter(tool => {
                const matchCategory = currentCategory === 'all' || tool.category === currentCategory;
                const matchSearch = searchQuery === '' || 
                    tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            
            // 在结果中插入广告位（每6个卡片后）

            filtered.forEach((tool, index) => {
                html += `

                            </div>
                            <div class="tool-info">

                                <span class="tag">${getCategoryName(tool.category)}</span>
                            </div>
                        </div>
                        <p class="tool-description">${tool.description}</p>
                        <div class="tool-footer">

                                <span>❤️ ${tool.likes}</span>
                            </div>
                            <a href="${tool.url}" target="_blank" class="visit-btn">访问</a>
                        </div>
                    </div>
                `;
                
                // 每6个卡片后插入一个广告位
                if ((index + 1) % 6 === 0 && index !== filtered.length - 1) {
                    html += `
                        <div class="ad-card">
                            <div class="ad-label">广告位</div>
                            <div>网格内广告<br>适合产品推广</div>
                        </div>
                    `;
                }
            });

            grid.innerHTML = html;
        }

        function getCategoryName(cat) {
            const map = {
                'chat': '聊天对话',
                'image': '图像生成',
                'video': '视频创作',
                'code': '编程开发',
                'write': '写作辅助',
                'audio': '音频处理',
                'design': '设计创意'
            };
            return map[cat] || cat;
        }

        // 渲染热门工具
        function renderHotTools() {
            const hot = [...tools].sort((a, b) => parseFloat(b.likes) - parseFloat(a.likes)).slice(0, 8);
            const container = document.getElementById('hotTools');
            container.innerHTML = hot.map((tool, i) => `
                <div class="hot-tool" onclick="window.open('${tool.url}', '_blank')">
                    <div class="hot-rank ${i < 3 ? 'top3' : ''}">${i + 1}</div>
                    <div class="hot-info">
                        <div class="name">${tool.name}</div>
                        <div class="desc">${tool.description}</div>
                    </div>
                </div>
            `).join('');
        }

        // 分类切换
        document.getElementById('categories').addEventListener('click', e => {
            if (e.target.classList.contains('category-btn')) {
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                renderTools();
            }
        });

        // 搜索
        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            renderTools();
        });

        // 初始化
        renderTools();
        renderHotTools();
    </script>
</body>
</html>
